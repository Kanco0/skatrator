<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skatorator // Deck Lab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <svg viewBox="0 0 260 52" width="200" height="42" aria-label="Skatorator">
                <defs>
                    <path id="arc" d="M 10,44 Q 130,10 250,44"/>
                </defs>
                <text class="logo-svg-text">
                    <textPath href="#arc" startOffset="50%" text-anchor="middle">SKATORATOR</textPath>
                </text>
            </svg>
        </div>

        <div class="search-wrap">
            <svg class="ico-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search decks…" autocomplete="off" spellcheck="false">
        </div>

        <nav class="nav-links">
            <button class="nav-btn active" type="button">Shop</button>
            <button class="nav-btn" type="button">Decks</button>
            <button class="nav-btn" type="button">About</button>
            <button id="cart-btn" class="nav-btn cart-pill" type="button">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Cart <span id="cart-count">0</span>
            </button>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="container">

        <!-- FOCUS PANEL -->
        <section id="focus-panel" class="focus-panel hidden" aria-live="polite">
            <div class="focus-card">
                <div class="focus-img-wrap">
                    <img id="focus-img" src="" alt="">
                    <div class="focus-img-placeholder"></div>
                </div>
                <div class="focus-info">
                    <span class="eyebrow">Selected Deck</span>
                    <h2 id="focus-name"></h2>
                    <p id="focus-price" class="focus-price"></p>
                    <p id="focus-desc" class="focus-desc"></p>
                    <div class="focus-actions">
                        <button id="add-to-cart-btn" class="btn-primary" type="button">Add to Cart</button>
                        <button id="close-focus-btn" class="btn-ghost" type="button">Clear</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PRODUCT GRID -->
        <section id="shop-grid" class="shop-grid" aria-label="Skateboards"></section>

        <!-- EMPTY STATE -->
        <div id="empty-state" class="empty-state hidden">
            <p>No decks match your search.</p>
        </div>

    </main>

    <!-- CART MODAL -->
    <div id="cart-modal" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Cart">
        <div class="sidebar">
            <div class="sidebar-head">
                <h2>Your Cart</h2>
                <button id="close-cart-btn" class="close-btn" type="button" aria-label="Close cart">&times;</button>
            </div>
            <div id="cart-list" class="cart-list"></div>
            <div class="sidebar-foot">
                <div class="pay-mode">
                    <span class="label-tag">Payment</span>
                    <div class="pay-card active">
                        <span class="pay-title">Pay on Delivery</span>
                        <span class="pay-sub">Cash only · COD</span>
                    </div>
                </div>
                <div class="total-row">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn-primary full" type="button">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkout-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Checkout">
        <div class="modal-card">
            <div class="modal-head">
                <h2>Checkout</h2>
                <button id="close-checkout-btn" class="close-btn" type="button" aria-label="Close checkout">&times;</button>
            </div>
            <form id="checkout-form" novalidate>
                <div class="field-group">
                    <span class="label-tag">Shipping & Contact</span>
                    <div class="field"><input type="text"  id="f-name"    placeholder="Full Name"             autocomplete="name"    required></div>
                    <div class="field"><input type="email" id="f-email"   placeholder="Email Address"         autocomplete="email"   required></div>
                    <div class="field"><input type="tel"   id="f-phone"   placeholder="Phone (optional)"      autocomplete="tel"></div>
                    <div class="field"><input type="text"  id="f-address" placeholder="Shipping Address"      autocomplete="street-address" required></div>
                </div>
                <div class="order-preview">
                    <span>Order Total</span>
                    <span id="checkout-total">$0.00</span>
                </div>
                <button type="submit" id="place-order-btn" class="btn-primary full">Place Order</button>
            </form>
        </div>
    </div>

    <!-- RECEIPT MODAL -->
    <div id="receipt-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Order receipt">
        <div class="modal-card receipt-card">
            <div class="success-ring">✓</div>
            <h2>Order Confirmed</h2>
            <p class="receipt-sub">A confirmation email has been sent to your inbox.</p>
            <div id="receipt-body" class="receipt-box"></div>
            <button id="close-receipt-btn" class="btn-primary full" type="button" style="margin-top:24px">Back to Shop</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
